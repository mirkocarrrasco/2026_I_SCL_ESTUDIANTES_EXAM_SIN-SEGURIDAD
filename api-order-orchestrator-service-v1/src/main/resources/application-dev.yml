spring:
  config:
    import: "optional:configserver:http://localhost:8888"  # o sin 'optional:' si quieres que falle si no hay server

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
#  instance:
#    prefer-ip-address: true //Usar cuando no se resuelve el hostname del contenedor Docker


resilience4j:
  circuitbreaker:
    instances:
      chargePaymentV2CB:      # Nombre del CircuitBreaker, debe coincidir con el usado en @CircuitBreaker(name="chargeService")
        slidingWindowSize: 10               # Número de llamadas consideradas en la "ventana deslizante" para calcular el estado (CLOSED/HALF-OPEN/OPEN)
        failureRateThreshold: 50            # Porcentaje de fallos (0-100) para abrir el circuito. Ej: 50 significa que si 50% de llamadas fallan, se abre
        waitDurationInOpenState: 10s         # Tiempo que el circuito permanece abierto antes de pasar a HALF-OPEN para probar si el servicio ya se recuperó
        permittedNumberOfCallsInHalfOpenState: 3   # Cantidad de llamadas permitidas cuando está en HALF-OPEN para evaluar si el servicio funciona de nuevo
        minimumNumberOfCalls: 5             # Mínimo de llamadas necesarias antes de evaluar si debe abrirse el circuito (para evitar decisiones con pocos datos)

  retry:
    instances:
      defaultRetry: # Nombre que nosotros definimos
        max-attempts: 10          # Número máximo de intentos
        wait-duration: 1s        # Tiempo de espera entre intentos, despues de que termina la ejecución fallida
        #retry-exceptions:
        #  - com.mitocode.orchestrator.exception.ServiceUnavailableException  # Tipos de excepciones que van a disparar el retry
        #  - feign.FeignException
        #  - feign.RetryableException
        #ignore-exceptions:
        #  - java.lang.IllegalArgumentException # Se ignoran, no se reintenta
        #  - com.mitocode.orchestrator.exception.ServiceTimeOutException

  ratelimiter:
    instances:
      chargeRateLimiter: # Nombre que nosotros definimos
        limit-for-period: 2       # máximo de llamadas permitidas
        limit-refresh-period: 10s # cada cuánto se reinicia el contador
        timeout-duration: 4s  #las llamadas excendentes esperan por un slot libre durante 1s segundos sino se llama al fallback

# =========================
# Spring Boot Actuator Reference
# =========================

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
        #include: "*" # Exponer todos los endpoints (en producción, es mejor limitar esto a solo los necesarios)
      base-path: /actuator
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# =========================
# Lista de endpoints comunes y su descripción
# =========================
# health        -> Estado de salud del servicio (UP/DOWN)
# info          -> Información personalizada (version, build, etc.)
# metrics       -> Métricas de JVM, HTTP, datasource, etc.
# env           -> Variables de entorno y propiedades de Spring
# beans         -> Lista de beans cargados en el contexto
# caches        -> Estado de los caches configurados
# loggers       -> Información y nivel de log
# threaddump    -> Thread dump de la JVM
# heapdump      -> Heap dump (útil para debugging)
# auditevents   -> Eventos de auditoría
# sessions      -> Información de sesiones HTTP
# prometheus    -> Métricas en formato Prometheus
# scheduledtasks-> Tareas programadas y su estado
# mappings      -> Todos los endpoints y rutas expuestas por tu aplicación
# conditions    -> Condiciones de autoconfiguración de Spring Boot

